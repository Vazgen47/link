<!DOCTYPE html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MKHEYAN AGENCY | Digital Card</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>


<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');


body{
font-family:'Inter',sans-serif;
background:#050505;
color:white;
}


.glass{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
}


.hover-lift{
transition:.35s ease;
}


.hover-lift:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.08);
}


.fade{
animation:fade 1s ease;
}


@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>



<script>


const translations={


hy:{
title:"Վեբ մշակում • Բրենդինգ • Թվային լուծումներ",
email:"Էլ․ փոստ",
phone:"Հեռախոս",
website:"Կայք",
location:"Հայաստան • Ամբողջ աշխարհ",
share:"Կիսվել",
save:"Պահպանել"
},


en:{
title:"Web Development • Branding • Digital Solutions",
email:"Email",
phone:"Phone",
website:"Website",
location:"Armenia • Worldwide",
share:"Share",
save:"Save"
},


ru:{
title:"Веб-разработка • Брендинг • Цифровые решения",
email:"Эл. почта",
phone:"Телефон",
website:"Сайт",
location:"Армения • Весь мир",
share:"Поделиться",
save:"Сохранить"
}


};



function changeLanguage(lang){


let t=translations[lang];


document.getElementById("brandTitle").innerHTML=t.title;

document.getElementById("emailText").innerHTML=t.email;

document.getElementById("phoneText").innerHTML=t.phone;

document.getElementById("websiteText").innerHTML=t.website;

document.getElementById("locationText").innerHTML=t.location;

document.getElementById("shareText").innerHTML=t.share;

document.getElementById("saveText").innerHTML=t.save;


}


</script>


</head>

<span>
+374 77 43 08 86

<script>


lucide.createIcons();



function shareCard(){

if(navigator.share){

navigator.share({

title:"MKHEYAN AGENCY",

url:window.location.href

});

}

}



function saveContact(){


const vcard=`BEGIN:VCARD
VERSION:3.0
FN:MKHEYAN AGENCY
ORG:MKHEYAN AGENCY
TITLE:Digital Creative Agency
TEL:+37477430886
EMAIL:mkheyan.agency@gmail.com
URL:https://mkheyan.agency
END:VCARD`;


const blob=new Blob(
[vcard],
{type:"text/vcard"}
);


const url=URL.createObjectURL(blob);


const a=document.createElement("a");

a.href=url;

a.download="MKHEYAN_AGENCY.vcf";

a.click();


}



</script>
