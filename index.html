<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkheyan Agency | Digital Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        .gradient-text { background: linear-gradient(45deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-8">
        <div class="text-center space-y-4 animate-in fade-in duration-1000">
            <div class="w-32 h-32 mx-auto rounded-3xl overflow-hidden glass shadow-2xl border border-white/10">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Vazgen Mkheyan</h1>
                <p class="text-white/50 uppercase tracking-[4px] text-xs mt-2">Mkheyan Agency</p>
                <div class="mt-4 flex justify-center items-center gap-2 text-sm text-emerald-400">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                    <span>Hybrid / Remote</span>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <a href="mailto:mkheyan.agency@gmail.com" class="glass p-4 rounded-2xl flex items-center justify-between hover-lift">
                <span class="font-medium">Email Us</span>
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>

            <a href="tel:+37477430886" class="glass p-4 rounded-2xl flex items-center justify-between hover-lift">
                <span class="font-medium">Call 077 43 08 86</span>
                <i data-lucide="phone" class="w-5 h-5"></i>
            </a>

            <a href="tel:+37499430886" class="glass p-4 rounded-2xl flex items-center justify-between hover-lift">
                <span class="font-medium">Call 099 43 08 86</span>
                <i data-lucide="phone" class="w-5 h-5"></i>
            </a>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="shareCard()" class="bg-white text-black p-4 rounded-2xl font-bold flex justify-center items-center gap-2 hover:opacity-90 transition">
                <i data-lucide="share-2" class="w-5 h-5"></i> Share
            </button>
            <button onclick="saveContact()" class="glass p-4 rounded-2xl font-bold flex justify-center items-center gap-2 hover-lift">
                <i data-lucide="user-plus" class="w-5 h-5"></i> Save
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Share API
        function shareCard() {
            if (navigator.share) {
                navigator.share({ title: 'Mkheyan Agency', url: window.location.href });
            } else {
                alert('Հղումը պատճենվեց');
            }
        }

        // Save Contact (VCF simulation)
        function saveContact() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Vazgen Mkheyan
ORG:Mkheyan Agency
TEL;TYPE=CELL:+37477430886
TEL;TYPE=CELL:+37499430886
EMAIL:mkheyan.agency@gmail.com
END:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Vazgen_Mkheyan.vcf';
            a.click();
        }
    </script>
</body>
</html>
