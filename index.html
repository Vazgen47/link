<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkheyan Agency | Digital vCard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'media' }
    </script>
    <style>
        body { transition: background 0.3s ease; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        @media (prefers-color-scheme: light) {
            body { background: #f9f9f9; color: #050505; }
            .glass { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.1); }
        }
        @media (prefers-color-scheme: dark) {
            body { background: #050505; color: #ffffff; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <div class="w-20 h-20 mx-auto rounded-2xl glass flex items-center justify-center">
                <i data-lucide="zap" class="w-8 h-8"></i>
            </div>
            <h1 class="text-xl font-bold">Vazgen Mkheyan</h1>
            <p class="text-xs opacity-60 uppercase tracking-widest">Mkheyan Agency</p>
        </div>

        <!-- Links -->
        <div class="space-y-3">
            <a href="https://mkheyan.agency" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>mkheyan.agency</span>
                <i data-lucide="globe" class="w-4 h-4"></i>
            </a>
            <a href="https://t.me/MkheyanAgencyNews" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>@MkheyanAgencyNews</span>
                <i data-lucide="newspaper" class="w-4 h-4"></i>
            </a>
            <a href="https://t.me/MkheyanAgencySupport" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>@MkheyanAgencySupport</span>
                <i data-lucide="message-circle" class="w-4 h-4"></i>
            </a>
            <a href="https://wa.me/message/QRM33NSCYND2C1" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>WhatsApp</span>
                <i data-lucide="message-square" class="w-4 h-4"></i>
            </a>
            <a href="https://www.instagram.com/mkheyan.agency/" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>Instagram</span>
                <i data-lucide="instagram" class="w-4 h-4"></i>
            </a>
            <a href="https://www.threads.com/@mkheyan.agency" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>Threads</span>
                <i data-lucide="at-sign" class="w-4 h-4"></i>
            </a>
            <a href="https://www.facebook.com/mkheyan.agency" class="glass p-4 rounded-xl flex items-center justify-between hover:scale-[1.02] transition">
                <span>Facebook</span>
                <i data-lucide="facebook" class="w-4 h-4"></i>
            </a>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
