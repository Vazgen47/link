<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkheyan Agency | Digital vCard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm space-y-6">
        
        <!-- Profile Header -->
        <div class="text-center space-y-2">
            <div class="w-24 h-24 mx-auto rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
                <i data-lucide="code-2" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Vazgen Mkheyan</h1>
            <p class="text-gray-400 text-sm">Founder & Full-Stack Developer</p>
        </div>

        <!-- Links Grid -->
        <div class="space-y-3">
            <a href="https://t.me/vazgenmkheyan" class="glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 transition">
                <span>Telegram</span>
                <i data-lucide="send" class="w-4 h-4"></i>
            </a>
            <a href="https://instagram.com/mkheyan.agency" class="glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 transition">
                <span>Instagram</span>
                <i data-lucide="instagram" class="w-4 h-4"></i>
            </a>
            <a href="https://mkheyan.agency" class="glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 transition">
                <span>Website</span>
                <i data-lucide="globe" class="w-4 h-4"></i>
            </a>
            <a href="mailto:info@mkheyan.agency" class="glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 transition">
                <span>Email</span>
                <i data-lucide="mail" class="w-4 h-4"></i>
            </a>
        </div>

        <!-- Footer -->
        <div class="pt-8 text-center">
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Mkheyan Agency © 2026</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
