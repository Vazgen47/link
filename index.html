<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background:#050505;
    color:white;
}

.glass {
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
}

.hover-lift {
    transition:.35s ease;
}

.hover-lift:hover {
    transform:translateY(-5px);
    background:rgba(255,255,255,.08);
}

.fade {
    animation:fade 1s ease;
}

@keyframes fade {
    from {
        opacity:0;
        transform:translateY(20px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}
</style>
<script>

const translations = {

phone:"Phone",

location:"Armenia • Worldwide",

save:"Save",

name:"MKHEYAN AGENCY",

phone:"Телефон",

share:"Поделиться",
save:"Сохранить",
footer:"© 2026 MKHEYAN AGENCY"

function changeLanguage(lang){


document.querySelector("#brandName").innerHTML =
translations[lang].name;


document.querySelector("#brandTitle").innerHTML =
translations[lang].title;


document.querySelector("#emailText").innerHTML =
translations[lang].email;


document.querySelector("#phoneText").innerHTML =
translations[lang].phone;

translations[lang].website;


document.querySelector("#locationText").innerHTML =
translations[lang].location;


document.querySelector("#shareText").innerHTML =
translations[lang].share;


document.querySelector("#saveText").innerHTML =
translations[lang].save;


document.querySelector("#footerText").innerHTML =
translations[lang].footer;


}

</script>

<script>

lucide.createIcons();



function shareCard(){

if(navigator.share){

navigator.share({

title:"MKHEYAN AGENCY",

text:"Digital Creative Agency",

url:window.location.href

});

}

}




function saveContact(){


const vcard = `BEGIN:VCARD
VERSION:3.0
FN:MKHEYAN AGENCY
ORG:MKHEYAN AGENCY
TITLE:Digital Creative Agency
TEL;TYPE=WORK:+37477430886
EMAIL:mkheyan.agency@gmail.com
URL:https://mkheyan.agency
NOTE:Web Development | Branding | Digital Solutions
END:VCARD`;


const blob = new Blob(
[vcard],
{
type:"text/vcard"
}
);


const url = URL.createObjectURL(blob);


const link=document.createElement("a");

link.href=url;

link.download="MKHEYAN_AGENCY.vcf";

link.click();


URL.revokeObjectURL(url);


}


</script>
